name: Release

# Builds foyer.nro (browser) for the Switch and attaches it to a
# GitHub release. The browser preset has BUILD_PLAYER=OFF, so this
# workflow never needs the foyer-cores recipes repo.
#
# Triggers on tag push v*.*.*; can also be run manually for dry-runs
# (no release published in that case).

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write
  packages: read

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      # Pre-baked devkitPro builder image, shared with foyer-cores'
      # matrix (built by foyer-cores/.github/workflows/build-image.yml).
      # Bakes switch-portlibs + switch-sdl2 + switch-sdl2-libs at
      # image-build time so this workflow never depends on
      # pkg.devkitpro.org's CDN at runtime — that CDN sustained a
      # 403 outage during the v0.3.0 release attempts and burnt
      # through every retry.
      #
      # 0.6.x browser additionally pulls borealis
      # (XITRIX/borealis@moonlight_wiliwili) and a handful of
      # vendored deps via FetchContent at configure time. Image
      # only needs git + network for that — no extra apt packages.
      #
      # Cross-repo pull works because the foyer-cores-builder
      # package has the foyer repo linked with read access (org
      # settings: packages → foyer-cores-builder → Manage Actions
      # access → foyer / read).
      image: ghcr.io/foyer-frontend/foyer-cores-builder:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout foyer
        uses: actions/checkout@v5
        with:
          fetch-depth: 0   # so `git rev-parse --short HEAD` works

      - name: Trust the workspace inside container
        run: git config --global --add safe.directory '*'

      # Browser-side ccache layered on top of the image-baked
      # /opt/ccache (borealis + foyer_shared warmed at image build
      # time). Cache key includes shared/ + browser/ so a browser
      # edit doesn't poison cores' shared TU hashes.
      - name: Restore release ccache
        uses: actions/cache@v4
        with:
          path: /opt/ccache
          key: ccache-release-${{ hashFiles('CMakeLists.txt', 'shared/**', 'browser/**') }}
          restore-keys: |
            ccache-release-

      - name: Configure ccache
        run: |
          ccache --max-size=500M
          ccache --zero-stats
          echo "CCACHE_COMPILERCHECK=content"  >> "$GITHUB_ENV"
          echo "CCACHE_DIR=/opt/ccache"        >> "$GITHUB_ENV"
          echo "CCACHE_SLOPPINESS=time_macros,include_file_mtime,include_file_ctime,file_macro" >> "$GITHUB_ENV"

      - name: Configure
        env:
          DEVKITPRO: /opt/devkitpro
        run: |
          cmake --preset Release \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache

      - name: Build
        # Cap parallelism to runner cores. Borealis + vendored fmt
        # parallel-compile aggressively; unbounded -j on a 2-core
        # ubuntu-latest container has OOM'd before.
        run: |
          cmake --build --preset Release -j $(nproc)
          ccache --show-stats | head -8 || true

      - name: Stage release artefacts
        run: |
          mkdir -p out
          cp build/Release/foyer.nro out/foyer.nro
          ( cd out && sha256sum foyer.nro > foyer.nro.sha256 )

          # Asset pack — systems/ + themes/ art that used to ship
          # inside foyer.nro's romfs. ~46 MB total. Stripping it out
          # of the binary keeps foyer.nro small enough for hbloader's
          # chain-launch unmap path; the browser downloads this zip
          # into /foyer/data/assets/ on first run.
          ( cd assets/romfs && zip -r9 "$GITHUB_WORKSPACE/out/foyer-assets.zip" \
              systems themes >/dev/null )
          ( cd out && sha256sum foyer-assets.zip > foyer-assets.zip.sha256 )

          # foyer-manifest.json is what foyer's in-app update flow
          # polls. Tag-only — workflow_dispatch runs leave it
          # absent so a dry-run never publishes a stale manifest.
          if [ -n "${GITHUB_REF_NAME:-}" ] && [ "${GITHUB_REF_NAME#v}" != "$GITHUB_REF_NAME" ]; then
            version="${GITHUB_REF_NAME#v}"
            size=$(stat -c%s out/foyer.nro)
            sum=$(sha256sum out/foyer.nro | cut -d' ' -f1)
            url="https://github.com/${{ github.repository }}/releases/download/${GITHUB_REF_NAME}/foyer.nro"
            printf '{\n  "version": "%s",\n  "url": "%s",\n  "size": %d,\n  "sha256": "%s"\n}\n' \
                "$version" "$url" "$size" "$sum" > out/foyer-manifest.json
            cat out/foyer-manifest.json
          fi
          ls -lh out/

      - name: Upload build artefact
        uses: actions/upload-artifact@v5
        with:
          name: foyer-nro
          path: out/

      - name: Publish release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            out/foyer.nro
            out/foyer.nro.sha256
            out/foyer-manifest.json
            out/foyer-assets.zip
            out/foyer-assets.zip.sha256
          generate_release_notes: true
          fail_on_unmatched_files: true
