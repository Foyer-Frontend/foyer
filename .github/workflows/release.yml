name: Release

# Builds foyer.nro for the Switch and attaches it to a GitHub release.
# Triggers on tag push v*.*.*; can also be run manually for dry-runs.

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: devkitpro/devkita64:latest
    steps:
      - name: Checkout foyer
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # so `git rev-parse --short HEAD` works

      - name: Trust the workspace inside container
        run: git config --global --add safe.directory '*'

      - name: Install Switch portlibs
        # 20 attempts × widening backoff. pkg.devkitpro.org is
        # periodically flaky (403s sustained for hours during v0.3.0).
        # The robust fix is to use the foyer-cores-builder GHCR image
        # — but that package is org-private and foyer's GITHUB_TOKEN
        # can't read it cross-repo. Switching here once the package
        # is made public OR linked to the foyer repo (admin action in
        # the GitHub UI: org settings → packages → foyer-cores-builder
        # → "Manage access" → add foyer with read).
        run: |
          delay=10
          for attempt in $(seq 1 20); do
              if dkp-pacman -Syu --needed --noconfirm \
                  switch-portlibs switch-sdl2 switch-sdl2-libs; then
                  exit 0
              fi
              echo "dkp-pacman attempt $attempt failed; sleeping ${delay}s..."
              sleep "$delay"
              delay=$(( delay + 10 ))
              [ "$delay" -gt 90 ] && delay=90
          done
          echo "dkp-pacman failed after 20 attempts" >&2
          exit 1

      - name: Configure
        env:
          DEVKITPRO: /opt/devkitpro
        run: cmake --preset Release

      - name: Build
        run: cmake --build --preset Release -j

      - name: Stage release artefacts
        run: |
          mkdir -p out
          cp build/Release/foyer.nro out/foyer.nro
          ( cd out && sha256sum foyer.nro > foyer.nro.sha256 )

          # foyer-manifest.json is what foyer's self-update flow polls.
          # Tag-only — workflow_dispatch runs leave it absent.
          if [ -n "${GITHUB_REF_NAME:-}" ] && [ "${GITHUB_REF_NAME#v}" != "$GITHUB_REF_NAME" ]; then
            version="${GITHUB_REF_NAME#v}"
            size=$(stat -c%s out/foyer.nro)
            sum=$(sha256sum out/foyer.nro | cut -d' ' -f1)
            url="https://github.com/${{ github.repository }}/releases/download/${GITHUB_REF_NAME}/foyer.nro"
            printf '{\n  "version": "%s",\n  "url": "%s",\n  "size": %d,\n  "sha256": "%s"\n}\n' \
                "$version" "$url" "$size" "$sum" > out/foyer-manifest.json
            cat out/foyer-manifest.json
          fi
          ls -lh out/

      - name: Upload build artefact
        uses: actions/upload-artifact@v4
        with:
          name: foyer-nro
          path: out/

      - name: Publish release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            out/foyer.nro
            out/foyer.nro.sha256
            out/foyer-manifest.json
          generate_release_notes: true
          fail_on_unmatched_files: true
